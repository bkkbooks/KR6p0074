body:
  text: 沙門善導集記奉請四天王直入道場中奉請師子王師子亦難逢奮迅身毛衣衆魔退散去回頭請法師直取涅槃城序曰竊以娑婆廣大火宅無邊六道周居重昏永夜生盲無目慧照未明引導無方俱摧死地循環來去等逝水長流託命投神誰之能救斯乃識含無際窮塵之劫更踰自爾悠悠遇勝緣之何日上從海德初際如來乃至今時釋迦諸佛皆乘弘誓悲智雙行不捨含情三輪普化然我無明障重佛出不逢設使同生還如覆器神光等照不簡四生慈及無偏皆資法潤雖沈法水長劫由頑苦集相因毒火臨時還發仰惟大悲恩重等潤身田智慧冥加道芽增長慈悲方便視教隨宜勸念彌陀歸乎淨土地則衆珍雜間光色競輝德水澄華玲瓏影徹寶樓重接等輝神光林樹垂瓔風塵雅曲華臺嚴瑩種種希奇聖衆同居明踰千日身則紫金之色相好儼然進止往來乘空無礙若論依報則超絶十方地上虛空等皆無異他方凡聖乘願往來到彼無殊齊同不退但以如來善巧總勸四生棄此娑婆欣生極樂專稱名號兼誦彌陀經欲令識彼莊嚴厭斯苦事三因五念畢命為期正助四修則剎那無間回斯功業普備含靈壽盡乘臺齊臨彼國凡欲為自欲為他立道場者先須嚴飾堂舍安置尊像幡華竟衆等無問多少盡令洗浴著淨衣入道場聽法若欲召請人及和讚者盡立大衆令坐使一人先須燒香散華周匝一遍竟然後依法作聲召請云般舟三昧樂願往生大衆同心厭三界無量樂般舟三昧樂願往生三塗永絶願無名無量樂三界火宅難居止願往生乘佛願力往西方無量樂般舟三昧樂願往生念報慈恩常頂戴無量樂大衆持華恭敬立願往生先請彌陀入道場無量樂般舟三昧樂願往生不違弘願應時迎無量樂觀首勢至塵沙衆願往生從佛乘華來入會無量樂般舟三昧樂願往生觀音接手入華臺無量樂無勝莊嚴釋迦佛願往生受我微心入道場無量樂般舟三昧樂願往生碎身慚謝釋迦恩無量樂彼國莊嚴大海衆願往生從佛乘華來入會無量樂般舟三昧樂願往生助佛神化度衆生無量樂十方恆沙佛舒舌願往生證我凡夫生安樂無量樂般舟三昧樂願往生悲心利物大悲心無量樂慚愧恆沙大悲心願往生受我微心入道場無量樂般舟三昧樂願往生專心淨土佛前期無量樂一一如來大海衆願往生從佛乘華來入會無量樂般舟三昧樂願往生盡是往生增上緣無量樂佛使二十五菩薩願往生一切時來常護念無量樂般舟三昧樂願往生畢命直入涅槃城無量樂佛恐衆生四魔障願往生未至極樂墮三塗無量樂般舟三昧樂願往生直心實行佛迎來無量樂我今衆等深慚謝願往生受我微心來入會無量樂般舟三昧樂願往生心心專注出娑婆無量樂本國彌陀諸聖衆願往生平等俱來坐道場無量樂般舟三昧樂願往生道場聖衆實難逢無量樂衆等頂禮彌陀會願往生普散香華同供養無量樂般舟三昧樂願往生彌陀光攝往生人無量樂對佛彌陀涅槃會願往生各發誓願請華臺無量樂般舟三昧樂願往生極樂莊嚴門盡開無量樂般舟三昧樂願往生專心念佛坐華臺無量樂般舟三昧樂願往生乘華直入不須疑無量樂衆等齊心請高座往生樂愍懟智影説尊經往生樂難思議往生樂雙樹林下往生樂難思往生樂道場時逢難叵遇往生樂無常迅速命難停往生樂難思議往生樂雙樹林下往生樂難思往生樂眼前業道人人見往生樂皆由三毒作因緣往生樂難思議往生樂雙樹林下往生樂難思往生樂雖得人身常暗鈍往生樂貪瞋邪見轉專專往生樂難思議往生樂雙樹林下往生樂難思往生樂日夜惛惛不惺悟往生樂還是流浪三塗因往生樂難思議往生樂雙樹林下往生樂難思往生樂忽爾輪回長劫苦往生樂彌陀淨土何時聞往生樂難思議往生樂雙樹林下往生樂難思往生樂大衆同心請高座往生樂為度群生轉法輪往生樂難思議往生樂雙樹林下往生樂難思往生樂衆等傾心樂聞法往生樂手執香華常供養往生樂難思議往生樂雙樹林下往生樂難思往生樂道場大衆裏相與至心敬禮南無常住佛道場大衆裏相與至心敬禮南無常住法道場大衆裏相與至心敬禮南無常住僧敬白道場衆等各各斂心彈指合掌叩頭歸命禮本師釋迦佛過現未來諸世尊所以歸依佛者佛是衆生大慈悲父亦是出世增上良緣計其恩德過於塵劫述之難盡賢愚經言一一諸佛從初發意終至菩提專心求法不顧身財悲智雙行曾無退念或可逢人逼試皮肉分張或自割身而延鴿命或捨千頭以求法或釘千釘而求四句或刺身血以濟夜叉或捨妻子以充羅剎或設慈悲方便化作禽魚用濟蒼生免其飢難或作金毛師子以上獵師或作白象抽牙為求菩提而奉施或觀怨家由如赤子或現外道比若親兒彼我無殊聖凡何異三祇起行皆與無漏相應地地收功始得果圓號佛身則閻浮金光色喻千日競暉相好分明譬若衆星夜朗跏趺正坐不背之相圓明法界同歸各覩如來面相身心湛寂化用不失時機隨類變通報體則元來不動但以如來智德嘆之難盡道場衆等各生慚謝之心能使諸佛為我捨身過於塵劫哀哉世尊能為難事長劫勤勤忍疲勞之苦痛雖復為生苦行不覓小恩望欲等出塵勞會菩提而歸彼岸衆等齊心為今施主某甲等奉請十方諸佛一切世尊弟子等敬尋諸佛境界唯佛能知國土精華非凡所測三身化用皆立淨土以導群生法體無殊有識歸之得悟但為凡夫亂想寄託無由故使釋迦諸佛不捨慈悲直指西方十萬億剎國名極樂佛號彌陀現在説法其國清淨具四德莊嚴永絶譏嫌等無憂惱人天善惡皆得往生到彼無殊齊同不退何意然者乃由彌陀因地世饒王佛所捨位出家即起悲智之心廣弘四十八願以佛願力五逆之與十惡罪滅得生謗法闡提回心皆往復因韋提致請誓捨娑婆念念無遺決定求生極樂如來因其請故即説定散兩門三福九章廣作未聞之益十方恆沙諸佛共讚釋迦舒舌遍覆三千證得往生非謬如是等諸佛世尊不捨慈悲受今施主某甲及衆生請入此道場證明功德奉請已今勸衆生等各各斂心歸依合掌下座接高讚云願往生願往生衆等咸歸命本師釋迦佛十方世界諸如來願受施主衆生請不捨慈悲入道場證明功德滅諸罪回心一念見彌陀衆等身心皆踊躍手執香華常供養高接下讚云高接下請召云重白道場大衆等各各斂心彈指合掌叩頭一心歸命為今施主及衆生次當奉請十方法界諸佛所説修多羅藏八萬四千又請全身散身舍利等唯願放大神光入此道場證明功德又請十方聲聞緣覺得道聖人唯願不捨慈悲現大神通入此道場證明功德又當奉請諸菩薩衆普賢文殊觀音勢至等唯願不捨慈悲滿衆生願入此道場證明功德所以歸依奉請者此諸菩薩從初發意乃至菩提常行平等接引無偏自利利他無時暫息常以法音覺諸世間光明普照無量佛土一切世界六種震動總攝魔界動魔宮殿摑裂邪網消滅諸見散諸塵勞壞諸欲塹開闡法門顯明清白光融佛法宣流正化常作不染身口意業常行不退身口意行常行不動身口意業常行讚嘆身口意業常行清淨身口意業常行離惱身口意業常行智慧身口意業覺悟成就定慧成就此諸菩薩常為諸天龍八部人王梵王等守護恭敬供養一切衆生為救為歸為明為尊為勝為上具無量行願多所饒益安穩天人利益一切遊步十方行權方便入佛法藏究竟彼岸智慧聖明不可思議轉佛法輪成就如來一切種智於一切法悉得自在如是等菩薩大士不可稱計唯願不捨慈悲受衆生請一時來會入此道場為今施主某甲證明功德今勸道場衆等人等斂心歸依合掌禮下接高讚云願往生願往生衆等希聞諸佛法龍宮八萬四千藏已施神光入道場證明功德復滿願因茲離苦見彌陀法界含靈亦除障我等身心皆踊躍手執香華常供養高接下讚云願往生願往生龍宮經藏如恆沙十方佛法復過是我今標心普皆請放大神光入道場證明功德復除罪增長施主菩提芽衆等各各齊心念手執香華常供養下接高讚云願往生願往生今日道場難得遇無上佛法亦難聞畢命形枯斷諸惡從是念念罪皆除六根得了得惺悟戒定慈悲誓不虛衆等身心皆踊躍手執香華常供養高接下讚云下接高讚云願往生願往生久住娑婆常沒沒三惡四趣盡皆停被毛戴角受衆苦未曾聞見聖人名憶此疲勞長劫事誓願捨命見彌陀衆等身心皆踊躍手執香華常供養高接下讚云願往生願往生衆等咸歸命今為施主及衆生已請十方法界全身舍利碎體金剛物利隨宜分形影赴雖復形分大小神化一種無殊大則類同山嶽小則比若芥塵畢命真誠齊心供養近則人天獲報富樂長劫隨身遠則淨土無生剋果則涅槃之常樂又願道場衆等各各齊心手執香華常供養下接高讚云願往生願往生真身舍利隨大小見聞歡喜修供養自作善根他人福一切合集皆回向晝夜精勤不敢退專心決定見彌陀衆等身心皆踊躍手執香華常供養高接下讚云下接高讚云願往生願往生普賢文殊弘誓願十方佛子皆亦然一念分身遍六道隨機化度斷因緣願我生生得親近圍繞聽法悟真門永拔無明生死業誓作彌陀淨土人衆等各各齊身心手執香華常供養下接高讚云願往生願往生十方菩薩大慈悲不惜身命度衆生六道分身隨類現為説妙法證無生無生淨土隨人入廣大寬平無比量四種威律常見佛法侶携將入寶堂衆等身心皆踊躍手執香華常供養下接高讚云高接下讚云願往生願往生為今施主及衆生奉請賢聖入道場證明功德修供養三毒煩惱因茲滅無明黑暗罪皆除願我生生值諸佛念念修道至無餘回此今生功德業當來畢定在金渠衆等各各齊身心手執香華常供養下接高讚云願往生願往生菩薩聖衆身雖別慈悲智慧等無殊不惜身財求妙法難行苦行未曾休誓到菩提登彼岸放大慈光度有流有流衆生我身是乘光畢命入西方衆等身心皆踊躍手執香華常供養高接下讚云下接高讚云願往生願往生為今施主皆已請十方諸佛入道場龍宮法藏真舍利已放神光入道場羅漢辟支通自在一念乘華入道場普賢文殊諸菩薩一切俱來入道場是諸聖衆如雲集地上虛空難可量各坐蓮華百寶座證明功德放慈光如此聖衆難逢遇同時發願入西方衆等齊心皆踊躍手執香華常供養請觀世音讚云奉請觀世音散華樂慈悲降道場散華樂斂容空裏現散華樂忿怒伏魔王散華樂騰身振法鼓散華樂勇猛現威光散華樂手中香色乳散華樂眉際白毫光散華樂寶蓋隨身轉散華樂蓮華逐步祥散華樂池回八味水散華樂華分戒定香散華樂飢餐九定食散華樂渴飲四禪漿散華樂西方七寶樹散華樂聲韻合宮商散華樂枝中明實相散華樂葉外現無常散華樂願捨閻浮報散華樂發願入西方散華樂高接下請香華云重白道場衆等各各斂心彈指合掌叩頭標心運想今為施主某甲等奉請十方法界人天凡聖水陸虛空一切香華音樂光明寶藏香山香衣香樹香林香池香水入此道場又請一切寶樹寶林寶衣寶池寶水寶幢寶蓋寶華寶網寶樓寶閣入此道場又請一切華林華樹華幢華蓋華樓華閣華宮華殿華衣入此道場又請一切光雲樹光雲林光雲網光雲衣光雲蓋光雲幢光雲臺光雲樓光雲閣光雲樂光雲香光雲池光雲水光雲山入此道場又請一切香雲山香雲衣香雲樹香雲林香雲網香雲蓋香雲幢香雲樓香雲閣香雲池香雲水香雲光香雲樂香雲華香雲臺入此道場又請一切寶雲山寶雲樹寶雲華寶雲果寶雲