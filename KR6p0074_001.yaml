如雨而下滿阿鼻城此蟲下時阿鼻猛火其炎大熾赤光火炎照八萬四千由旬從阿鼻地獄上衝大海沃燋山下大海水渧如車軸許成大鐵炎滿阿鼻城佛言若有衆生殺害三寶偷劫三寶污染三寶欺誑三寶謗毀三寶破壞三寶殺害父母偷劫父母污染父母欺誑父母謗毀父母破壞父母罵辱六親作如是等殺逆罪者命終之時銅狗張口化十八車狀如金車寶蓋在上一切火炎化為玉女罪人遙見心生歡喜我欲往中我欲住中風刀解時寒急失聲寧得好火在車上座然火自爆作是念已即便命終揮霍之間已坐金車顧瞻玉女皆捉鐵斧斬截其身身下火起如旋火輪譬如壯士屈伸臂頃直落阿鼻大地獄中從於上隔如旋火輪至下隔際身遍隔內銅狗大吼齧骨唼髓獄卒羅剎捉大鐵叉叉頸令起遍體火炎滿阿鼻城鐵網雨刀從毛孔入化閻羅王大聲告敕癡人獄種汝在世時不孝父母邪慢無道汝今生處名阿鼻獄汝不知恩無有慚愧受此苦惱為樂不耶作是語已即滅不現爾時獄卒復驅罪人從於下隔乃至上隔經歷八萬四千隔中𢫫身而過至鐵網際一日一夜當此閻浮提日月歲數六十小劫如是壽命盡一大劫五逆罪人無慚無愧造作五逆罪故臨命終時十八風刀如鐵火車解截其身以熱逼故便作是言得好色華清涼大樹於下遊戲不亦樂乎作此念時阿鼻地獄八萬四千諸惡劍林化作寶樹華果茂盛行列在前大熱火炎化為蓮華在彼樹下罪人見已我所願者今已得果作是語時疾於暴雨坐蓮華上坐已須臾鐵觜諸蟲從火華起穿骨入髓徹心穿腦攀樹而上一切劍枝削肉徹骨無量刀林當上而下火車爐炭十八苦事一時來迎此相現時陷墜地下從下隔上身如華敷遍滿下隔從下隔起火炎猛熾至於上隔至上隔已身滿其中熱惱急故張眼吐舌此人罪故萬億融銅百千刀輪從空中下頭入足出一切苦事過於上説百千萬倍具五逆者其人受苦足滿五劫弟子道場衆等自從元身已來乃至今身至於今日於其中間放縱三業作如是等罪樂行多作無量無邊今聞佛説阿鼻地獄心驚毛竪怖懼無量慚愧無量今對道場凡聖發露懺悔願罪消滅永盡無餘懺悔已至心歸命禮阿彌陀佛下接高讚云懺悔已至心歸命禮阿彌陀佛高接下懺云弟子道場衆等自從曠劫已來乃至今身至於今日於其中間放從身口意業造一切罪或破五戒八戒十戒三歸戒四不壞信戒三業戒十無盡戒聲聞戒大乘戒及一切威儀戒四重八戒等虛食信施誹謗邪見不識因果斷學波若毀十方佛偷僧祇物淫姪無道逼掠淨戒諸比丘尼姊妹親戚不知慚愧毀辱所親造衆惡事或樂行十惡不修十善障樂行八苦不持八戒障樂行三毒不受三歸障樂行五逆不持五戒障樂行地獄極苦業不修淨土極樂障樂行畜生愚癡業不修智慧慈悲障樂行慳貪餓鬼嫉妬業不行布施利他障樂行諂曲虛詐修羅業不行真實言信不相違障樂行瞋惱殺害毒龍業不行歡喜慈心障樂行我慢自大下賤不自在業不行謙下敬上尊貴障樂行邪見破戒破見惡見謂修善無福造惡無殃外道闡提業不行正見禁行出世往生淨土障樂行破滅三寶壞人善事惡鬼業不行護惜三寶成人功德具足障樂受三界人天長時縛繫業不貪淨土無生解脫障樂受二乘狹劣業不行菩薩廣大慈悲障樂行親近惡友業不樂親近諸佛菩薩善知識障樂行六貪六弊業不行六度四攝障樂行不識因果抵突業不知身中有如來佛性障樂行食噉一切衆生酒肉五辛多病短命業不行慈心樂聞佛法僧香華供養障如是障罪自作教他見作隨喜若故作誤作戲笑作瞋嫌作違順愛憎作無量無邊思量不可盡不可盡説不可説亦如大地微塵無數虛空無邊法界無邊法性無邊方便無邊我及衆生造罪亦復如是如是等罪上至諸菩薩下至聲聞緣覺所不能知唯佛與佛乃能知我罪之多少地獄經云若有衆生作是罪者臨命終時風刀解身偃臥不定如被楚撻其心荒越發狂癡想見己室宅男女大小一切皆是不淨之物屎尿臭處盈流于外爾時罪人即作是語云何此處無好城郭及好山林使吾遊戲乃處如此不淨物間作是語已獄卒羅剎以大鐵叉擎阿鼻獄及諸刀林化作寶樹及清涼池火炎化作金葉蓮華諸鐵觜蟲化為鳧雁地獄痛聲如歌詠音罪人聞已如此好處吾當遊中念已尋時坐火蓮華諸鐵觜蟲從身毛孔唼食其軀百千鐵輪從頂上入恆沙鐵叉挑其眼精地獄銅狗化作百億鐵狗競分其身取心而食俄爾之間身如鐵華滿十八隔中一一華葉八萬四千一一葉頭身手支節在一隔間地獄不大此身不小遍滿如此大地獄中此等罪人墮此地獄經歷八萬四千大劫此泥犁滅復入東方十八隔中如前受苦此阿鼻獄南亦十八隔西亦十八隔北亦十八隔謗方等經具五逆罪破壞僧祇污比丘尼斷諸善根如此罪人具衆罪者身滿阿鼻獄四支復滿十八隔中此阿鼻獄但燒如此獄種衆生劫欲盡時東門即開見東門外清泉流水華果林樹一切俱現是諸罪人從下隔見眼火暫歇從下隔起婉轉腹行𢫫身上走到上隔中手攀刀輪時虛空中雨熱鐵丸走趣東門既至門閫獄卒羅剎手捉鐵叉逆刺其眼鐵狗齧心悶絶而死死已復生見南門開如前不異如是西門北門亦皆如此如此時間經歷半劫阿鼻獄死生寒氷中寒氷獄死生黑暗處八千萬歲目無所見受大蛇身婉轉腹行諸情暗塞無所解知百千狐狼牽掣食之命終之後生畜生中五千萬身受鳥獸形還生人中聾盲瘖啞疥癩癰疽貧窮下賤一切諸衰以為嚴飾受此賤身經五百身後還得生餓鬼之中如是等輪回三惡無量無邊弟子衆等今聞地獄心驚毛竪怖懼無量恐畏殘殃不盡復還流浪今生已來縱暴三業造衆重罪若不懺悔定招此苦無有出期今對三寶道場大衆前發露懺悔即安樂知而不敢覆藏唯願十方三寶法界衆生發大慈悲廣大慈悲不計我惡如草覆地布施歡喜受我懺悔憶我清淨唯願不捨慈悲攝變我等已作之罪願除滅未起之罪願不生已作之善願增長未作之善方便令生願從今日乃至不起忍已來誓共衆生捨邪歸正發菩提心慈心相向佛眼相看菩提眷屬真善知識同生淨土乃至成佛如是等罪永斷相續更不敢覆藏發願已至心歸命阿彌陀佛下接高讚云願往生願往生願在彌陀佛前立手執香華常供養高接下讚云願往生願往生願在彌陀會中坐手執香華常供養
